name: ${PROJECT_SLUG}

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${ENVIRONMENT}

    image: ${PROJECT_SLUG}-api:latest
    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    networks:
      - network

    expose:
      - "8000"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    image: postgres:18-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql

    networks:
      - network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  network:
    name: rede-${PROJECT_SLUG}
    driver: bridge
