<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jira Bot — Biopark</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .shell {
      width: 420px;
      height: 680px;
      background: #16213e;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }

    /* ── header ── */
    .header {
      background: #0f3460;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 38px; height: 38px;
      background: #e94560;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #fff; font-size: 15px;
      flex-shrink: 0;
    }
    .header-info h2 { color: #fff; font-size: 15px; font-weight: 600; }
    .header-info span { color: #8ba3c7; font-size: 12px; }
    .dot {
      width: 8px; height: 8px; background: #4caf50;
      border-radius: 50%; margin-left: auto;
    }

    /* ── messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

    .msg { display: flex; gap: 8px; max-width: 88%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .bubble {
      padding: 9px 13px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #e94560;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #0f3460;
      color: #d6e4f7;
      border-bottom-left-radius: 4px;
    }
    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
      margin-top: 2px;
    }
    .msg.bot  .msg-avatar { background: #e94560; color: #fff; }
    .msg.user .msg-avatar { background: #0078d4; color: #fff; }

    .typing .bubble { color: #8ba3c7; font-style: italic; }

    /* ── suggestions ── */
    .suggestions {
      padding: 0 16px 8px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip {
      background: #0f3460;
      color: #8ba3c7;
      border: 1px solid #1a4a7a;
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      cursor: pointer;
      transition: .15s;
      user-select: none;
    }
    .chip:hover { background: #1a4a7a; color: #d6e4f7; }

    /* ── input ── */
    .input-row {
      padding: 12px 14px;
      background: #0f3460;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      background: #16213e;
      border: 1px solid #1a4a7a;
      border-radius: 22px;
      padding: 9px 16px;
      color: #d6e4f7;
      font-size: 14px;
      outline: none;
      resize: none;
      max-height: 80px;
      line-height: 1.4;
      font-family: inherit;
    }
    #input::placeholder { color: #4a6285; }
    #input:focus { border-color: #e94560; }
    #send {
      width: 38px; height: 38px;
      background: #e94560;
      border: none; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: .15s;
    }
    #send:hover { background: #c73652; }
    #send svg { width: 16px; height: 16px; fill: #fff; }
  </style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="avatar">JB</div>
    <div class="header-info">
      <h2>Assistente Jira</h2>
      <span>Biopark Hackathon 2026</span>
    </div>
    <div class="dot"></div>
  </div>

  <div id="messages"></div>

  <div class="suggestions" id="chips">
    <span class="chip" onclick="send('meus tickets')">meus tickets</span>
    <span class="chip" onclick="send('tickets atrasados')">atrasados</span>
    <span class="chip" onclick="send('ajuda')">ajuda</span>
  </div>

  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Digite uma mensagem…"></textarea>
    <button id="send" onclick="sendInput()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('input');
  const convId     = 'webchat-' + Math.random().toString(36).slice(2);

  function addMsg(text, who) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${who}`;

    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = who === 'bot' ? 'JB' : 'EU';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function addTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot typing';
    wrap.id = 'typing';
    wrap.innerHTML = '<div class="msg-avatar">JB</div><div class="bubble">digitando…</div>';
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send(text) {
    if (!text.trim()) return;
    addMsg(text, 'user');
    inputEl.value = '';
    inputEl.style.height = 'auto';
    addTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, conversation_id: convId, user_email: 'User' })
      });
      const data = await res.json();
      removeTyping();
      addMsg(data.response, 'bot');
    } catch (e) {
      removeTyping();
      addMsg('Erro ao conectar com o servidor.', 'bot');
    }
  }

  function sendInput() {
    send(inputEl.value.trim());
  }

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendInput();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
  });

  // Mensagem de boas-vindas
  setTimeout(() => addMsg(
    'Olá! 👋 Sou o assistente de tickets Jira da Biopark.\n\nTente: "meus tickets", "tickets atrasados" ou "detalha KAN-5"',
    'bot'
  ), 400);
</script>
</body>
</html>
